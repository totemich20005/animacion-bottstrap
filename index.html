<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animación con Bootstrap + Animate.css</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Animate.css (Animate.style) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body class="bg-light">
  <div class="container py-5">

    <div class="card shadow-sm p-4">
      <h1 class="mb-3">Demo Animación</h1>
      <p class="text-muted mb-4">
        Haz clic en el botón para animar la alerta con Animate.css.
      </p>

      <button id="btnAnimar" class="btn btn-primary">
        Animar elemento
      </button>

      <div id="objetivo"
           class="alert alert-success mt-4 d-none"
           role="alert">
        ✅ ¡Animación funcionando con Bootstrap + Animate.css!
      </div>
    </div>

  </div>

  <!-- Bootstrap JS (opcional, solo si usas componentes con JS) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const btn = document.getElementById('btnAnimar');
    const box = document.getElementById('objetivo');

    btn.addEventListener('click', () => {
      // Mostrar el elemento
      box.classList.remove('d-none');

      // Reiniciar animación (por si se repite)
      box.classList.remove('animate__animated', 'animate__bounceIn');
      void box.offsetWidth; // truco para “reflow”

      // Aplicar animación (Animate.css v4 usa prefijo animate__)
      box.classList.add('animate__animated', 'animate__bounceIn');
    });
  </script>
</body>
</html>
